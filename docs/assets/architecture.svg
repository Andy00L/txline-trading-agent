<svg viewBox="0 0 960 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Architecture: a TypeScript monorepo where dashboard reads api, api projects agent state, agent drives runPipeline over txline and onchain-client on top of a pure core, with the Anchor agent_ledger program as the on-chain settle target and a replay backtest sharing the same code path">
  <defs>
    <marker id="dep" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280" />
    </marker>
    <style>
      .t { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      .title { font-weight: 700; font-size: 19px; fill: #1B1F24; }
      .pkg { font-weight: 700; font-size: 13.5px; fill: #1B1F24; }
      .sub { font-size: 11px; fill: #6B7280; }
      .foot { font-size: 12px; fill: #6B7280; }
      .edge { font-size: 10.5px; font-weight: 700; fill: #2B5FD9; letter-spacing: 0.03em; }
    </style>
  </defs>

  <rect x="1" y="1" width="958" height="398" rx="16" fill="#FBF9F4" stroke="#E7E1D5" />
  <text x="32" y="38" class="t title">Architecture: one code path, live and replay</text>

  <!-- left stack: dashboard -> api -> agent -> {txline, onchain-client} -> core -->
  <g>
    <rect x="40" y="56" width="360" height="50" rx="10" fill="#FFFFFF" stroke="#E7E1D5" />
    <text x="220" y="80" text-anchor="middle" class="t pkg">dashboard</text>
    <text x="220" y="97" text-anchor="middle" class="t sub">Vite + React, reads the API over HTTP/SSE only</text>
  </g>
  <line x1="220" y1="106" x2="220" y2="120" stroke="#6B7280" stroke-width="1.6" marker-end="url(#dep)" />
  <g>
    <rect x="40" y="120" width="360" height="50" rx="10" fill="#FFFFFF" stroke="#E7E1D5" />
    <text x="220" y="144" text-anchor="middle" class="t pkg">api</text>
    <text x="220" y="161" text-anchor="middle" class="t sub">read-only HTTP + SSE projection (node:http)</text>
  </g>
  <line x1="220" y1="170" x2="220" y2="184" stroke="#6B7280" stroke-width="1.6" marker-end="url(#dep)" />
  <g>
    <rect x="40" y="184" width="360" height="50" rx="10" fill="#FFFFFF" stroke="#2B5FD9" stroke-width="1.5" />
    <text x="220" y="208" text-anchor="middle" class="t pkg">agent</text>
    <text x="220" y="225" text-anchor="middle" class="t sub">composition root: feed to runPipeline to on-chain sink</text>
  </g>
  <line x1="126" y1="234" x2="126" y2="248" stroke="#6B7280" stroke-width="1.6" marker-end="url(#dep)" />
  <line x1="314" y1="234" x2="314" y2="248" stroke="#6B7280" stroke-width="1.6" marker-end="url(#dep)" />
  <g>
    <rect x="40" y="248" width="172" height="50" rx="10" fill="#FFFFFF" stroke="#E7E1D5" />
    <text x="126" y="272" text-anchor="middle" class="t pkg">txline</text>
    <text x="126" y="289" text-anchor="middle" class="t sub">REST + SSE, zod, feeds</text>
  </g>
  <g>
    <rect x="228" y="248" width="172" height="50" rx="10" fill="#FFFFFF" stroke="#E7E1D5" />
    <text x="314" y="272" text-anchor="middle" class="t pkg">onchain-client</text>
    <text x="314" y="289" text-anchor="middle" class="t sub">@solana/kit: commit + settle</text>
  </g>
  <line x1="126" y1="298" x2="126" y2="312" stroke="#6B7280" stroke-width="1.6" marker-end="url(#dep)" />
  <line x1="314" y1="298" x2="314" y2="312" stroke="#6B7280" stroke-width="1.6" marker-end="url(#dep)" />
  <g>
    <rect x="40" y="312" width="360" height="52" rx="10" fill="#F4F1EA" stroke="#1B1F24" stroke-width="1.3" />
    <text x="220" y="337" text-anchor="middle" class="t pkg">core</text>
    <text x="220" y="354" text-anchor="middle" class="t sub">pure quant + domain + decision + pipeline. No IO, deterministic.</text>
  </g>

  <!-- right: backtest (same code path) and the on-chain program -->
  <g>
    <rect x="540" y="120" width="380" height="50" rx="10" fill="#FFFFFF" stroke="#E7E1D5" />
    <text x="730" y="144" text-anchor="middle" class="t pkg">backtest</text>
    <text x="730" y="161" text-anchor="middle" class="t sub">replay harness: CLV, calibration, drawdown, walk-forward</text>
  </g>
  <g>
    <rect x="540" y="248" width="380" height="50" rx="10" fill="#F1F8F4" stroke="#1F8A5B" stroke-width="1.5" />
    <text x="730" y="272" text-anchor="middle" class="t pkg">programs/agent_ledger</text>
    <text x="730" y="289" text-anchor="middle" class="t sub">Anchor program (devnet): commit-reveal + validate_stat CPI</text>
  </g>
  <text x="540" y="240" class="t edge">commit / settle CPI</text>
  <line x1="402" y1="273" x2="538" y2="273" stroke="#6B7280" stroke-width="1.6" marker-end="url(#dep)" />

  <text x="32" y="386" class="t foot">One code path: LiveSseFeed (live) and ReplayFeed (replay) run the same runPipeline over the PipelineSink seam, so a green replay backtest is evidence about live behaviour.</text>
</svg>
